# Environment variables

# Same cursor you use in Plasma (lives in ~/.icons/Sweet-cursors). Without
# XCURSOR_THEME set, Hyprland falls back to the plain default cursor.
env = XCURSOR_THEME,Sweet-cursors
env = XCURSOR_SIZE,24
# Qt/KDE apps read this one instead of XCURSOR_SIZE.
env = HYPRCURSOR_SIZE,24
# Use KDE's platform theme (plasma-integration is installed) so Qt/KDE apps
# like Dolphin pick up widget style, icons and colours. Do NOT set this to
# qt6ct unless you install qt6ct — a missing theme leaves Qt apps unstyled.
env = QT_QPA_PLATFORMTHEME,kde

# Wayland-native backends where they're safe
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Extra env variables
# env = MY_GLOBAL_ENV,setting
