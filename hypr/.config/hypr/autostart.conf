# Autostart processes

# Status bar, notifications, wallpaper
exec-once = waybar
exec-once = mako
# Starts hyprpaper and re-applies the saved wallpaper over IPC.
# (hyprpaper 0.8.4 ignores the `wallpaper =` line in its own config here.)
exec-once = ~/.config/hypr/scripts/wallpaper-restore.sh

# Clipboard history (feeds the SUPER+CTRL+V picker)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Polkit authentication agent (reusing the KDE one already installed)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Idle management / lock on idle
exec-once = hypridle

# Your old setup auto-launched these on login. Left off so first boots are
# quiet — uncomment whichever you want back.
# exec-once = zen-browser
# exec-once = alacritty
# exec-once = discord
# exec-once = anki
