# Keybindings — ported from Omarchy defaults + your personal bindings.
# Every omarchy-* helper has been replaced with a direct command.
# See all binds at runtime with: hyprctl binds

$terminal = alacritty
$browser  = zen-browser
$webapp   = chromium --app

##############################################################################
# Applications
##############################################################################

bindd = SUPER, RETURN, Terminal, exec, $terminal
bindd = SUPER ALT, RETURN, Tmux, exec, $terminal -e tmux new
bindd = SUPER SHIFT, RETURN, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private-window
bindd = SUPER SHIFT, F, File manager, exec, dolphin
bindd = SUPER SHIFT, M, Music, exec, spotify
bindd = SUPER SHIFT, N, Editor, exec, $terminal -e nvim
bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
bindd = SUPER ALT, D, Docker, exec, $terminal -e lazydocker
bindd = SUPER SHIFT, G, Signal, exec, signal-desktop
bindd = SUPER SHIFT, O, Obsidian, exec, obsidian

# Web apps. If your URL contains #, type it as ## — a single # starts a comment.
bindd = SUPER ALT, A, ChatGPT, exec, $webapp="https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, $webapp="https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, $webapp="https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, $webapp="https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, $webapp="https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, $webapp="https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, $webapp="https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, X, X, exec, $webapp="https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, $webapp="https://x.com/compose/post"

##############################################################################
# Menus & utilities
##############################################################################

bindd = SUPER, SPACE, Launch apps, exec, wofi --show drun
bindd = SUPER ALT, SPACE, Run command, exec, wofi --show run
bindd = SUPER CTRL, V, Clipboard manager, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bindd = SUPER SHIFT, SLASH, Show all keybindings, exec, ~/.config/hypr/scripts/keybinds.sh
bindd = SUPER, ESCAPE, Lock system, exec, ~/.config/hypr/scripts/lock.sh
bindd = SUPER CTRL, L, Lock system, exec, ~/.config/hypr/scripts/lock.sh
bindd = SUPER SHIFT, ESCAPE, Exit Hyprland, exit,

# `bindl` = stays active while the session is locked, which is the only way to
# offer session switching from hyprlock (it has no clickable widgets).
bindld = SUPER CTRL, U, Switch session (SDDM greeter), exec, ~/.config/hypr/scripts/session-switch.sh

# Escape hatch: if hyprlock ever dies and leaves the "lockscreen app died"
# screen, this reattaches a lock client without needing another TTY. Only
# works because misc:allow_session_lock_restore is enabled in looknfeel.conf.
bindld = SUPER SHIFT CTRL, L, Relaunch lock screen, exec, ~/.config/hypr/scripts/lock.sh

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, pavucontrol
bindd = SUPER CTRL, B, Bluetooth controls, exec, kcmshell6 kcm_bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, nm-connection-editor
bindd = SUPER CTRL, T, Activity, exec, $terminal -e btop

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, pkill -SIGUSR1 waybar
bindd = SUPER CTRL, SPACE, Wallpaper picker, exec, ~/.config/hypr/scripts/wallpaper-picker.sh
bindd = SUPER SHIFT CTRL, SPACE, Random wallpaper per monitor, exec, ~/.config/hypr/scripts/wallpaper-picker.sh --random

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "  $(date +'%A %H:%M · %d %B %Y · Week %V')"

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

##############################################################################
# Captures
##############################################################################

# Saved to ~/Pictures/Screenshots so they don't clutter the wallpaper picker.
bindd = , PRINT, Screenshot region, exec, hyprshot -m region -o ~/Pictures/Screenshots
bindd = SHIFT, PRINT, Screenshot window, exec, hyprshot -m window -o ~/Pictures/Screenshots
bindd = CTRL, PRINT, Screenshot output, exec, hyprshot -m output -o ~/Pictures/Screenshots

##############################################################################
# Clipboard (universal copy/paste, works in terminals too)
##############################################################################

bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert, activewindow
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert, activewindow
bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X, activewindow

##############################################################################
# Tiling
##############################################################################

bindd = SUPER, W, Close window, killactive,
bindd = SUPER ALT, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, P, Pseudo window, pseudo,
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1

# Move focus — vim keys and arrows both work
bindd = SUPER, H, Focus on left window, movefocus, l
bindd = SUPER, J, Focus on below window, movefocus, d
bindd = SUPER, K, Focus on above window, movefocus, u
bindd = SUPER, L, Focus on right window, movefocus, r

bindd = SUPER, LEFT, Focus on left window, movefocus, l
bindd = SUPER, RIGHT, Focus on right window, movefocus, r
bindd = SUPER, UP, Focus on above window, movefocus, u
bindd = SUPER, DOWN, Focus on below window, movefocus, d

# Move focus between monitors
bindd = SUPER, A, Focus on previous monitor, focusmonitor, -1
bindd = SUPER, D, Focus on next monitor, focusmonitor, +1

# Swap the workspaces shown on the two monitors
bindd = SUPER SHIFT, A, Swap monitor workspaces, swapactiveworkspaces, current +1
bindd = SUPER SHIFT, D, Swap monitor workspaces, swapactiveworkspaces, current +1

# Switch workspaces with SUPER + [1-9; 0]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [1-9; 0]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# Scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# Move workspaces to other monitors
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Swap active window with the one next to it — vim keys and arrows both work
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r

bindd = SUPER SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, UP, Swap window up, swapwindow, u
bindd = SUPER SHIFT, DOWN, Swap window down, swapwindow, d

# Cycle through applications on active workspace
bindd = ALT, TAB, Focus on next window, cyclenext
bindd = ALT SHIFT, TAB, Focus on previous window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Cycle through monitors
bindd = CTRL ALT, TAB, Focus on next monitor, focusmonitor, +1
bindd = CTRL ALT SHIFT, TAB, Focus on previous monitor, focusmonitor, -1

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# Move/resize windows with SUPER + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# Groups
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup
bindd = SUPER ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, UP, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, DOWN, Move window to group on bottom, moveintogroup, d
bindd = SUPER ALT, TAB, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b
bindd = SUPER CTRL, LEFT, Move grouped window focus left, changegroupactive, b
bindd = SUPER CTRL, RIGHT, Move grouped window focus right, changegroupactive, f

##############################################################################
# Media & hardware keys
##############################################################################

bindeld = , XF86AudioRaiseVolume, Volume up, exec, ~/.config/hypr/scripts/osd.sh volume up
bindeld = , XF86AudioLowerVolume, Volume down, exec, ~/.config/hypr/scripts/osd.sh volume down
bindeld = , XF86AudioMute, Mute, exec, ~/.config/hypr/scripts/osd.sh volume mute
bindeld = , XF86AudioMicMute, Mute microphone, exec, ~/.config/hypr/scripts/osd.sh mic mute

bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, pamixer -i 1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, pamixer -d 1

bindeld = , XF86MonBrightnessUp, Brightness up, exec, ~/.config/hypr/scripts/osd.sh brightness up
bindeld = , XF86MonBrightnessDown, Brightness down, exec, ~/.config/hypr/scripts/osd.sh brightness down
bindeld = SHIFT, XF86MonBrightnessUp, Brightness maximum, exec, brightnessctl set 100%
bindeld = SHIFT, XF86MonBrightnessDown, Brightness minimum, exec, brightnessctl set 1%
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, brightnessctl set +1%
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, brightnessctl set 1%-

bindeld = , XF86KbdBrightnessUp, Keyboard brightness up, exec, brightnessctl -d *::kbd_backlight set +33%
bindeld = , XF86KbdBrightnessDown, Keyboard brightness down, exec, brightnessctl -d *::kbd_backlight set 33%-

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# Lid switch — turn the internal panel off when closed
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2880x1800@120, 1920x0, 1.666667"
