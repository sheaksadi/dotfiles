# See https://wiki.hypr.land/Configuring/Basics/Window-Rules/
# Hyprland 0.53+ syntax

windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Float common dialogs and pickers
windowrule = float on, match:class (org.gnome.Nautilus|nm-connection-editor|blueman-manager|org.kde.polkit-kde-authentication-agent-1)

# KDE applets run standalone (wifi picker) and pavucontrol: float, sized and centred.
windowrule = float on, match:class (org.kde.plasmawindowed|org.pulseaudio.pavucontrol|pavucontrol)
windowrule = size 480 640, match:class org.kde.plasmawindowed
windowrule = center on, match:class org.kde.plasmawindowed
windowrule = size 800 600, match:class (org.pulseaudio.pavucontrol|pavucontrol)
windowrule = center on, match:class (org.pulseaudio.pavucontrol|pavucontrol)
windowrule = float on, match:title ^(Open File|Save File|Open Folder|Choose Files)$

# Picture-in-picture: float and pin
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$

# Tag everything for default opacity, then apply it. Apps can opt out by
# removing the tag with their own rule above this line.
windowrule = tag +default-opacity, match:class .*
windowrule = opacity 0.97 0.9, match:tag default-opacity

# Keep media and image viewers fully opaque
windowrule = opacity 1.0 1.0, match:class (mpv|imv|org.gnome.Loupe|vlc)
