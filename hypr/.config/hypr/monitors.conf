# See https://wiki.hypr.land/Configuring/Monitors/
# List current monitors and available modes: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Fallback so any monitor you plug in still lights up. Keep this FIRST —
# later, more specific rules override it.
monitor = , preferred, auto, 1

# External monitor (AOC 24G42E) sits to the LEFT of the laptop, so it starts at
# x=0 and the laptop begins where it ends. 180Hz is supported — it negotiates
# 60Hz if left unspecified.
monitor = DP-1, 1920x1080@180, 0x0, 1

# Internal laptop panel, positioned to the right of DP-1.
# x=1920 because that is DP-1's logical width (1920 at scale 1).
# 1.666667 gives this panel a logical size of 1728x1080.
monitor = eDP-1, 2880x1800@120, 1920x0, 1.666667

# Variable refresh rate (0 = off, 1 = on, 2 = fullscreen only)
vrr = 1

# Your old config set GDK_SCALE=2. That fights Hyprland's 1.666667 fractional
# scale and makes GTK apps render oversized, so it's off. Uncomment only if
# you switch eDP-1 to scale 2.
# env = GDK_SCALE,2
