# Catppuccin Mocha lock screen

$base     = rgb(1e1e2e)
$surface0 = rgb(313244)
$text     = rgb(cdd6f4)
$overlay0 = rgb(6c7086)
$mauve    = rgb(cba6f7)
$red      = rgb(f38ba8)
$green    = rgb(a6e3a1)

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    color = $base
    path = ~/Pictures/wallpapers/2-waves.png
    blur_passes = 3
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $surface0
    outer_color = $mauve
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $text

    placeholder_text = Enter Password
    check_color = $green
    fail_color = $red
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 8
    shadow_passes = 0
    fade_on_empty = false
}

label {
    monitor =
    text = $TIME
    color = $text
    font_size = 92
    font_family = JetBrainsMono Nerd Font
    position = 0, 240
    halign = center
    valign = center
}

# hyprlock has no clickable widgets, so the session-switch shortcut is only
# discoverable if we print it. The bind itself is `bindld` in bindings.conf,
# which keeps working while locked.
label {
    monitor =
    text = Super + Ctrl + U   switch session
    color = $overlay0
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}

auth {
    fingerprint:enabled = false
}
