# Refer to https://wiki.hypr.land/Configuring/Basics/Variables/
# Colors come from theme.conf (Catppuccin Mocha)

general {
    # Your old gap settings
    gaps_in = 1
    gaps_out = 4

    border_size = 2

    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(11111bee)
    }

    blur {
        enabled = true
        size = 2
        passes = 2
        special = true
        brightness = 0.60
        contrast = 0.75
    }
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = $activeBorderColor
    col.border_locked_inactive = $inactiveBorderColor

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = $text
        text_color_inactive = $subtext0
        col.active = rgba(cba6f740)
        col.inactive = rgba(45475a40)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 3.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}

dwindle {
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1

    # If the lock client (hyprlock) dies while the compositor still holds the
    # session lock, Hyprland keeps the session locked — releasing it would
    # expose the desktop — and shows the "lockscreen app died" fallback.
    # With this OFF (the default) no replacement lock client may attach, so the
    # only way out is another TTY. With it ON, scripts/lock.sh can simply
    # relaunch hyprlock and you are back in business.
    allow_session_lock_restore = true
}

cursor {
    # Both of these came from the Omarchy defaults and are unusual:
    # hide_on_key_press made the pointer vanish whenever you typed, and
    # warp_on_change_workspace teleported it on every workspace switch.
    # Set either back to true/1 if you actually liked them.
    hide_on_key_press = false
    warp_on_change_workspace = 0
}

# Auto toggle scratchpad on switching workspace from scratchpad
binds {
    hide_special_on_workspace_change = true
}
