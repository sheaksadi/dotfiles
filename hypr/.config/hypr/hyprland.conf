# Hyprland — ported from the old Omarchy setup, now self-contained.
# Docs: https://wiki.hypr.land/Configuring/

source = ~/.config/hypr/theme.conf        # Catppuccin Mocha palette
source = ~/.config/hypr/monitors.conf
