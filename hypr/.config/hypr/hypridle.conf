general {
    lock_cmd = /home/sadi/.config/hypr/scripts/lock.sh   # respawns hyprlock if it crashes
    before_sleep_cmd = loginctl lock-session             # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on           # turn the display back on after wake
    inhibit_sleep = 3                                    # wait until the screen is locked
}

# hypridle listeners are static, so each one calls scripts/idle.sh with a gate
# (`ac` or `battery`) and the script no-ops when it does not apply.
#
#              on battery      plugged in
#   dim          2.5 min         10 min
#   lock           5 min         30 min
#   screen off     6 min         31 min
#   suspend       30 min         never

################ on battery ################

# Dim after 2.5 minutes
listener {
    timeout = 150
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh dim battery
    on-resume  = /home/sadi/.config/hypr/scripts/idle.sh undim
}

# Lock after 5 minutes
listener {
    timeout = 300
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh lock battery
}

# Screen off after 6 minutes
listener {
    timeout = 360
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh dpms-off battery
    on-resume  = /home/sadi/.config/hypr/scripts/idle.sh dpms-on
}

# Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh suspend battery
}

################ plugged in ################

# Dim after 10 minutes
listener {
    timeout = 600
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh dim ac
    on-resume  = /home/sadi/.config/hypr/scripts/idle.sh undim
}

# Lock after 30 minutes.
# Deliberately 1790, not 1800: at exactly 1800 this would race the battery
# suspend listener, and on AC the lock must be settled before anything else.
listener {
    timeout = 1790
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh lock ac
}

# Screen off after 31 minutes
listener {
    timeout = 1860
    on-timeout = /home/sadi/.config/hypr/scripts/idle.sh dpms-off ac
    on-resume  = /home/sadi/.config/hypr/scripts/idle.sh dpms-on
}
