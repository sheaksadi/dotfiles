# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input

input {
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu
  # altgr-intl is identical to plain us for normal typing; it only adds
  # accented characters on the AltGr (level-3) layer. keyd's umlaut layer
  # sends AltGr+key to reach them, which needs this variant.
  #   AltGr+q ä   AltGr+r ë   AltGr+y ü   AltGr+p ö   AltGr+s ß
  kb_layout = us
  kb_variant = altgr-intl
  kb_options =
  # kb_options = compose:caps # ,grp:alts_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  follow_mouse = 1

  # Increase sensitivity for mouse/trackpad (default: 0)
  # sensitivity = 0.35

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4
  }
}

# Scroll faster in the terminal
windowrule = scroll_touchpad 1.5, match:class (Alacritty|kitty|foot)
windowrule = scroll_touchpad 0.2, match:class com.mitchellh.ghostty

# Enable touchpad gestures for changing workspaces
# See https://wiki.hypr.land/Configuring/Gestures/
# gesture = 3, horizontal, workspace
