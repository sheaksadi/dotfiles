[ids]
*

[main]
# Tap Caps Lock -> Escape.  Hold Caps Lock -> the "umlaut" layer below.
capslock = overload(umlaut, esc)

# Umlauts are produced by sending AltGr (level 3) plus the key that carries the
# character in the us(altgr-intl) layout -- see kb_variant in hypr/input.conf.
#
# This deliberately avoids keyd's built-in unicode support, which emits
# <Cancel>-prefixed compose sequences. Those only work if every application
# loads keyd's compose table, and when one does not you get the raw sequence
# text ("02s") typed instead of the character.
[umlaut]
a = G-q
e = G-r
o = G-p
u = G-y
s = G-s
